services:
  - type: web
    name: airjaz-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    plan: free
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AIRJAZ_URL
        value: https://airjaz.vercel.app/api/intake
      - key: AIRJAZ_SECRET
        sync: false
